<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정규리 — 식물 콜라주</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #F0EAE0;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: crosshair;
  font-family: serif;
}

/* grain overlay */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.055'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:9999;
}

.stage {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* specimen card */
.specimen {
  position: absolute;
  background: #FAF6EF;
  box-shadow: 1px 2px 8px rgba(0,0,0,0.10), 0 0 0 0.5px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: transform 0.35s cubic-bezier(0.23,1,0.32,1), box-shadow 0.3s ease, z-index 0s;
  will-change: transform;
}

.specimen:hover {
  box-shadow: 4px 8px 24px rgba(0,0,0,0.18);
  z-index: 500 !important;
}

/* pin */
.pin {
  position: absolute;
  top: -9px;
  left: 50%;
  transform: translateX(-50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
  z-index: 10;
  box-shadow: 0 2px 5px rgba(0,0,0,0.28), inset 0 1px 2px rgba(255,255,255,0.35);
}
.pin.red    { background: #B84022; }
.pin.brass  { background: #9A7A2A; }
.pin.silver { background: radial-gradient(circle at 40% 35%, #e0e0e0, #909090); }
.pin.bone   { background: #C8B99A; }

.pin::after {
  content:'';
  position:absolute;
  top:10px; left:50%;
  transform:translateX(-50%);
  width:1px; height:16px;
  background: rgba(0,0,0,0.15);
}

/* thread lines svg */
.threads {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

/* float animations */
@keyframes f1 { 0%,100%{transform:var(--t) translateY(0)} 50%{transform:var(--t) translateY(-5px)} }
@keyframes f2 { 0%,100%{transform:var(--t) translateY(0)} 50%{transform:var(--t) translateY(4px)} }
@keyframes f3 { 0%,100%{transform:var(--t) rotate(0deg)} 50%{transform:var(--t) rotate(1.5deg)} }
@keyframes f4 { 0%,100%{transform:var(--t) translateY(0) rotate(0)} 33%{transform:var(--t) translateY(-3px) rotate(0.5deg)} 66%{transform:var(--t) translateY(2px) rotate(-0.5deg)} }
</style>
</head>
<body>
<div class="stage" id="stage">
<svg class="threads" id="threads"></svg>

<!-- ══════════════════════════════════════════
  1. 덩굴·뿌리  →  바느질·원단 (커뮤)

<script>
const stage = document.getElementById('stage');
const svg = document.getElementById('threads');
const specimens = document.querySelectorAll('.specimen');

function getCenter(el) {
  const r = el.getBoundingClientRect();
  const sr = stage.getBoundingClientRect();
  return { x: r.left - sr.left + r.width/2, y: r.top - sr.top + r.height/2 };
}

function drawThreads() {
  svg.innerHTML = '';
  const W = stage.offsetWidth;
  const H = stage.offsetHeight;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  const pts = Array.from(specimens).map(getCenter);
  const pairs = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [9,10],[10,11],[11,12],[12,13],
    [14,15],[15,16],[16,17],[17,18],
    [4,9],[8,14],[13,18],
    [2,7],[6,11],[10,15]
  ];

  pairs.forEach(([i,j]) => {
    if (!pts[i] || !pts[j]) return;
    const mx = (pts[i].x + pts[j].x)/2 + (Math.random()-0.5)*30;
    const my = (pts[i].y + pts[j].y)/2 + (Math.random()-0.5)*20;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${pts[i].x},${pts[i].y} Q${mx},${my} ${pts[j].x},${pts[j].y}`);
    path.setAttribute('stroke','rgba(160,140,110,0.2)');
    path.setAttribute('stroke-width','0.6');
    path.setAttribute('stroke-dasharray','3 6');
    path.setAttribute('fill','none');
    svg.appendChild(path);
  });
}

// staggered fade in
specimens.forEach((s, i) => {
  s.style.opacity = '0';
  s.style.transition = `opacity 0.6s ease ${i * 0.08}s, transform 0.35s cubic-bezier(0.23,1,0.32,1), box-shadow 0.3s ease`;
  setTimeout(() => { s.style.opacity = '1'; }, i * 80 + 100);
});

// hover: dim others
specimens.forEach(s => {
  s.addEventListener('mouseenter', () => {
    specimens.forEach(o => { if (o !== s) o.style.opacity = '0.35'; });
  });
  s.addEventListener('mouseleave', () => {
    specimens.forEach(o => o.style.opacity = '1');
  });
});

window.addEventListener('load', () => setTimeout(drawThreads, 400));
window.addEventListener('resize', drawThreads);
</script>
